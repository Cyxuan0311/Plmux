name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run ruff check
        run: ruff check .

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-cov pytest-html pyperclip
      - name: Run tests with coverage
        run: |
          pytest -p no:cacheprovider --tb=short --cov=plmux --cov-report=xml:coverage.xml --cov-report=term-missing --html=report.html --self-contained-html -q
      - name: Test pass rate summary
        if: always()
        run: |
          python -c "
          import xml.etree.ElementTree as ET, sys
          try:
              tree = ET.parse('coverage.xml')
              root = tree.getroot()
              rate = float(root.attrib.get('line-rate', 0)) * 100
              print(f'Line coverage: {rate:.1f}%')
              if rate < 60:
                  print(f'::warning::Coverage {rate:.1f}% is below 60%')
          except Exception as e:
              print(f'Could not parse coverage: {e}')
          "
      - name: Upload coverage report
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload test report
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.html
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  coverage-check:
    name: Coverage Gate
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          continue-on-error: true
      - name: Check coverage threshold
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('coverage.xml')
              root = tree.getroot()
              rate = float(root.attrib.get('line-rate', 0)) * 100
              print(f'Line coverage: {rate:.1f}%')
              if rate < 60:
                  print(f'::warning::Coverage {rate:.1f}% is below 60%')
          except Exception as e:
              print(f'Could not parse coverage: {e}')
          "
